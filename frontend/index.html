<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenDevOps Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #111827;
      --surface:    #1f2937;
      --surface2:   #273344;
      --border:     #374151;
      --border2:    #4b5563;
      --text:       #f9fafb;
      --text-dim:   #9ca3af;
      --text-faint: #6b7280;
      --emerald:    #10b981;
      --emerald-dim:#065f46;
      --blue:       #3b82f6;
      --blue-dim:   #1e3a5f;
      --amber:      #f59e0b;
      --red:        #f87171;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #new-chat-btn {
      width: 100%;
      padding: 9px 12px;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 8px;
      color: var(--emerald);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s, border-color 0.15s;
    }
    #new-chat-btn:hover {
      background: rgba(16,185,129,0.15);
      border-color: rgba(16,185,129,0.35);
    }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .session-item {
      padding: 9px 10px;
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      transition: background 0.12s;
      border: 1px solid transparent;
    }
    .session-item:hover { background: var(--surface2); }
    .session-item.active {
      background: var(--surface2);
      border-color: var(--border);
    }

    .si-title {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 22px;
    }
    .si-meta {
      font-size: 11px;
      color: var(--text-faint);
    }

    .si-del {
      position: absolute;
      right: 7px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-faint);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .session-item:hover .si-del { opacity: 1; }
    .si-del:hover { color: var(--red); }

    .sessions-empty {
      padding: 24px 12px;
      font-size: 12px;
      color: var(--text-faint);
      text-align: center;
      line-height: 1.6;
    }

    #session-list::-webkit-scrollbar { width: 3px; }
    #session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Main column ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Header ── */
    header {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--emerald), #059669);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .logo h1 { font-size: 15px; font-weight: 600; color: var(--text); }
    .logo .badge {
      font-size: 10px; color: var(--emerald);
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 4px; padding: 1px 6px; font-weight: 500;
    }

    #session-label {
      font-size: 11px; color: var(--text-faint);
      font-family: "SF Mono", "Fira Code", monospace;
    }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 28px 24px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .turn { display: flex; flex-direction: column; gap: 6px; }
    .turn.user  { align-items: flex-end; }
    .turn.agent { align-items: flex-start; }

    .msg-row {
      display: flex; gap: 10px; align-items: flex-start; max-width: 780px;
    }
    .turn.user  .msg-row { flex-direction: row-reverse; }
    .turn.agent .msg-row { flex-direction: row; }

    .avatar {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; margin-top: 1px;
    }
    .turn.user  .avatar { background: var(--blue-dim); }
    .turn.agent .avatar { background: var(--emerald-dim); }

    .bubble {
      padding: 11px 15px; border-radius: 12px;
      font-size: 14px; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word; max-width: 680px;
    }
    .turn.user .bubble {
      background: var(--blue-dim);
      border: 1px solid #2563eb44;
      border-bottom-right-radius: 3px;
    }
    .turn.agent .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    /* ── Meta row: tool calls + usage side by side ── */
    .meta-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-left: 40px;
      max-width: 780px;
    }

    /* ── Tool calls collapsible ── */
    .tool-calls-box {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-size: 12px;
    }

    /* ── Usage card (collapsible) ── */
    .usage-box {
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-size: 12px;
      min-width: 160px;
    }
    .usage-header {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 12px;
      background: var(--surface2);
      cursor: pointer; user-select: none;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .usage-header:hover { background: var(--border); }
    .usage-header .uh-icon { font-size: 11px; }
    .usage-header .uh-summary {
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--text-dim); font-size: 11.5px;
    }
    .usage-header .uh-summary b { color: var(--text); font-weight: 600; }
    .usage-chevron { margin-left: auto; color: var(--text-faint); transition: transform 0.2s; font-size: 10px; }
    .usage-box.open .usage-chevron { transform: rotate(180deg); }

    .usage-body {
      display: none; flex-direction: column; gap: 6px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .usage-box.open .usage-body { display: flex; }

    .usage-row {
      display: flex; justify-content: space-between; align-items: center; gap: 20px;
    }
    .usage-row .uk { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); }
    .usage-row .uv { font-family: "SF Mono","Fira Code",monospace; font-size: 11.5px; color: var(--text); font-weight: 500; }
    .usage-total { border-top: 1px solid var(--border); padding-top: 6px; margin-top: 2px; }
    .usage-total .uv { color: var(--emerald); font-size: 12.5px; }
    .usage-model { font-size: 10px; color: var(--text-faint); font-family: "SF Mono","Fira Code",monospace; margin-top: 2px; word-break: break-all; }

    .tc-header {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px;
      background: var(--surface2);
      cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .tc-header:hover { background: var(--border); }

    .tc-header .tc-count { color: var(--emerald); font-weight: 600; font-family: "SF Mono","Fira Code",monospace; }
    .tc-header .tc-label { color: var(--text-dim); }
    .tc-chevron { margin-left: auto; color: var(--text-faint); transition: transform 0.2s; font-size: 10px; }
    .tool-calls-box.open .tc-chevron { transform: rotate(180deg); }

    .tc-body { display: none; flex-direction: column; }
    .tool-calls-box.open .tc-body { display: flex; }

    .tc-item {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: flex; flex-direction: column; gap: 7px;
    }

    .tc-name {
      font-family: "SF Mono","Fira Code",monospace;
      color: var(--amber); font-weight: 600; font-size: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .tc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--emerald); }

    .tc-section { display: flex; flex-direction: column; gap: 3px; }
    .tc-section-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-faint);
    }
    .tc-json {
      font-family: "SF Mono","Fira Code",monospace;
      font-size: 11.5px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 7px 10px;
      color: var(--text-dim);
      white-space: pre;
      max-height: 200px;
      overflow: auto;
      line-height: 1.5;
    }

    .tc-spinner {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      color: var(--text-faint); font-size: 12px;
      border-top: 1px solid var(--border);
    }
    .spinner-dots span {
      display: inline-block; width: 5px; height: 5px;
      border-radius: 50%; background: var(--emerald);
      margin: 0 1px; animation: bounce 1s infinite;
    }
    .spinner-dots span:nth-child(2) { animation-delay: 0.15s; }
    .spinner-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.4; }
      40%          { transform: translateY(-4px); opacity: 1; }
    }

    /* ── Streaming status label (above the bubble) ── */
    .stream-status {
      display: flex; align-items: center; gap: 8px;
      padding: 0 0 6px 40px; /* 40px = avatar (30px) + gap (10px) */
      font-size: 12px;
      color: var(--text-faint);
      font-style: italic;
    }

    /* ── Input ── */
    #input-area {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    #input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      padding: 10px 14px; resize: none; outline: none;
      min-height: 42px; max-height: 160px; line-height: 1.5;
      font-family: inherit; transition: border-color 0.15s;
    }
    #input:focus { border-color: var(--emerald); }
    #input::placeholder { color: var(--text-faint); }

    #send-btn {
      width: 42px; height: 42px; border-radius: 10px;
      background: var(--emerald); border: none;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: background 0.15s;
    }
    #send-btn:hover { background: #059669; }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }
    #send-btn svg { width: 17px; height: 17px; fill: white; }
    #send-btn.stopping { background: #dc2626; }
    #send-btn.stopping:hover { background: #b91c1c; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
    }
    .es-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--emerald), #059669);
      border-radius: 14px; display: flex; align-items: center;
      justify-content: center; font-size: 24px;
    }
    .empty-state h2 { font-size: 20px; color: var(--text); font-weight: 600; }
    .empty-state p { font-size: 13px; color: var(--text-dim); text-align: center; max-width: 400px; line-height: 1.6; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
    .chip {
      font-size: 12px; padding: 6px 13px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; cursor: pointer; color: var(--text-dim);
      transition: all 0.15s;
    }
    .chip:hover { color: var(--emerald); border-color: var(--emerald); background: rgba(16,185,129,0.05); }

    /* ── Markdown inside agent bubble ── */
    .bubble.agent-bubble { white-space: normal; }
    .agent-bubble p { margin: 0 0 8px; }
    .agent-bubble p:last-child { margin-bottom: 0; }
    .agent-bubble h1, .agent-bubble h2, .agent-bubble h3,
    .agent-bubble h4, .agent-bubble h5, .agent-bubble h6 {
      font-weight: 600; margin: 12px 0 5px; line-height: 1.3;
    }
    .agent-bubble h1 { font-size: 16px; }
    .agent-bubble h2 { font-size: 15px; }
    .agent-bubble h3 { font-size: 14px; }
    .agent-bubble h1:first-child, .agent-bubble h2:first-child,
    .agent-bubble h3:first-child { margin-top: 0; }
    .agent-bubble ul, .agent-bubble ol { padding-left: 20px; margin: 6px 0 8px; }
    .agent-bubble li { margin: 3px 0; line-height: 1.6; }
    .agent-bubble code {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12.5px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px;
    }
    .agent-bubble pre {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px; overflow-x: auto; margin: 8px 0;
    }
    .agent-bubble pre code { background: none; border: none; padding: 0; font-size: 12px; }
    .agent-bubble blockquote {
      border-left: 3px solid var(--emerald); padding-left: 12px;
      color: var(--text-dim); margin: 8px 0;
    }
    .agent-bubble strong { font-weight: 600; color: var(--text); }
    .agent-bubble em { font-style: italic; color: var(--text-dim); }
    .agent-bubble a { color: var(--blue); text-decoration: none; }
    .agent-bubble a:hover { text-decoration: underline; }
    .agent-bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .agent-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .agent-bubble th, .agent-bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .agent-bubble th { background: var(--surface2); font-weight: 600; }
    .agent-bubble tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    /* scrollbars */
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .tc-json::-webkit-scrollbar { width: 3px; height: 3px; }
    .tc-json::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside id="sidebar">
  <div class="sidebar-header">
    <button id="new-chat-btn" onclick="newChat()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New chat
    </button>
  </div>
  <div id="session-list"></div>
</aside>

<!-- ── Main ── -->
<div id="main">
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <h1>OpenDevOps Agent</h1>
      <span class="badge">BETA</span>
    </div>
    <span id="session-label"></span>
  </header>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="es-icon">⚡</div>
      <h2>OpenDevOps Agent</h2>
      <p>Ask about your AWS infrastructure or describe an incident — I'll investigate using your live AWS data.</p>
      <div class="chips">
        <span class="chip" onclick="useChip(this)">Why is my Lambda throttling?</span>
        <span class="chip" onclick="useChip(this)">Show alarms in ALARM state</span>
        <span class="chip" onclick="useChip(this)">Any deployments in the last 2 hours?</span>
        <span class="chip" onclick="useChip(this)">High error rate on payment service</span>
      </div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="Describe an incident or ask about your AWS environment…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg id="send-icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  // ── Markdown ─────────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });
  const renderMd = text => marked.parse(text);

  // ── Pricing ($/M tokens) ─────────────────────────────────────────────────
  const PRICING = {
    'google/gemma-4-26b-a4b-it':    { input: 0.07,  output: 0.35  },
    'anthropic/claude-3.5-sonnet':  { input: 3.00,  output: 15.00 },
    'openai/gpt-4o':                { input: 2.50,  output: 10.00 },
  };

  function calcCost(model, inputTok, outputTok) {
    const p = PRICING[model];
    if (!p || inputTok == null) return null;
    const inCost  = (inputTok  / 1e6) * p.input;
    const outCost = (outputTok / 1e6) * p.output;
    return { inCost, outCost, total: inCost + outCost };
  }

  function fmtCost(n) {
    if (n < 0.000001) return '< $0.000001';
    return '$' + n.toFixed(6).replace(/0+$/, '').replace(/\.$/, '');
  }

  // ── Session ──────────────────────────────────────────────────────────────
  let sessionId = localStorage.getItem('devops-session-id');
  if (!sessionId) { sessionId = crypto.randomUUID(); localStorage.setItem('devops-session-id', sessionId); }
  document.getElementById('session-label').textContent = sessionId.slice(0, 8);

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  const scrollBottom = () => messagesEl.scrollTop = messagesEl.scrollHeight;
  const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fmtJson = o => { try { return JSON.stringify(o, null, 2); } catch { return String(o); } };

  function relativeTime(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1)  return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function hideEmpty() {
    const es = document.getElementById('empty-state');
    if (es) es.remove();
  }

  function showEmpty() {
    messagesEl.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="es-icon">⚡</div>
        <h2>OpenDevOps Agent</h2>
        <p>Ask about your AWS infrastructure or describe an incident — I'll investigate using your live AWS data.</p>
        <div class="chips">
          <span class="chip" onclick="useChip(this)">Why is my Lambda throttling?</span>
          <span class="chip" onclick="useChip(this)">Show alarms in ALARM state</span>
          <span class="chip" onclick="useChip(this)">Any deployments in the last 2 hours?</span>
          <span class="chip" onclick="useChip(this)">High error rate on payment service</span>
        </div>
      </div>`;
  }

  function useChip(el) { inputEl.value = el.textContent.trim(); sendMessage(); }

  // ── Shared usage box builder ───────────────────────────────────────────────
  function _buildUsageBox(usage) {
    const secs   = ((usage.latency_ms || 0) / 1000).toFixed(1) + 's';
    const fmtTok = n => n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n ?? '—');
    const cost   = calcCost(usage.model, usage.input_tokens, usage.output_tokens);
    const costSummary = cost ? ` · <b>${fmtCost(cost.total)}</b>` : '';

    const box = document.createElement('div');
    box.className = 'usage-box';
    box.innerHTML = `
      <div class="usage-header">
        <span class="uh-icon">⚡</span>
        <span class="uh-summary"><b>${secs}</b>${costSummary}</span>
        <span class="usage-chevron">▼</span>
      </div>
      <div class="usage-body">
        <div class="usage-row"><span class="uk">Latency</span><span class="uv">${secs}</span></div>
        <div class="usage-row"><span class="uk">Input tokens</span><span class="uv">${fmtTok(usage.input_tokens)}${cost ? ' <span style="color:var(--text-faint);font-size:10px">(' + fmtCost(cost.inCost) + ')</span>' : ''}</span></div>
        <div class="usage-row"><span class="uk">Output tokens</span><span class="uv">${fmtTok(usage.output_tokens)}${cost ? ' <span style="color:var(--text-faint);font-size:10px">(' + fmtCost(cost.outCost) + ')</span>' : ''}</span></div>
        ${cost ? `<div class="usage-row usage-total"><span class="uk">Total cost</span><span class="uv">${fmtCost(cost.total)}</span></div>` : ''}
        <div class="usage-model">${usage.model || ''}</div>
      </div>`;
    box.querySelector('.usage-header').onclick = () => box.classList.toggle('open');
    return box;
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────
  async function loadSessions() {
    try {
      const res = await fetch('/sessions');
      if (!res.ok) return;
      renderSessions(await res.json());
    } catch {}
  }

  function renderSessions(sessions) {
    const list = document.getElementById('session-list');
    list.innerHTML = '';
    if (!sessions.length) {
      list.innerHTML = '<div class="sessions-empty">No past sessions yet.<br>Start a conversation to save it.</div>';
      return;
    }
    for (const s of sessions) {
      const item = document.createElement('div');
      item.className = 'session-item' + (s.id === sessionId ? ' active' : '');
      item.dataset.id = s.id;

      const title = document.createElement('div');
      title.className = 'si-title';
      title.textContent = s.title || 'Untitled session';

      const meta = document.createElement('div');
      meta.className = 'si-meta';
      meta.textContent = s.last_active_at ? relativeTime(s.last_active_at) : '';

      const del = document.createElement('button');
      del.className = 'si-del';
      del.textContent = '×';
      del.title = 'Delete session';
      del.onclick = e => { e.stopPropagation(); deleteSessionItem(s.id); };

      item.appendChild(title);
      item.appendChild(meta);
      item.appendChild(del);
      item.onclick = () => switchSession(s.id);
      list.appendChild(item);
    }
  }

  async function switchSession(id) {
    sessionId = id;
    localStorage.setItem('devops-session-id', sessionId);
    document.getElementById('session-label').textContent = sessionId.slice(0, 8);

    document.querySelectorAll('.session-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === id);
    });

    messagesEl.innerHTML = '';
    try {
      const res = await fetch(`/sessions/${id}/messages`);
      if (!res.ok) { showEmpty(); return; }
      const msgs = await res.json();
      if (!msgs.length) { showEmpty(); return; }
      for (const m of msgs) {
        if (m.role === 'user') addUserTurn(m.content);
        else if (m.role === 'assistant') addLoadedAgentTurn(m.content, m.tool_calls || [], m.usage || null);
      }
    } catch { showEmpty(); }
    scrollBottom();
  }

  async function deleteSessionItem(id) {
    await fetch(`/sessions/${id}`, { method: 'DELETE' });
    if (id === sessionId) newChat();
    loadSessions();
  }

  function newChat() {
    sessionId = crypto.randomUUID();
    localStorage.setItem('devops-session-id', sessionId);
    document.getElementById('session-label').textContent = sessionId.slice(0, 8);
    showEmpty();
    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  }

  // Load sidebar and restore current session on start
  async function init() {
    await loadSessions();
    try {
      const res = await fetch(`/sessions/${sessionId}/messages`);
      if (!res.ok) return;
      const msgs = await res.json();
      if (!msgs.length) return;
      messagesEl.innerHTML = '';
      for (const m of msgs) {
        if (m.role === 'user') addUserTurn(m.content);
        else if (m.role === 'assistant') addLoadedAgentTurn(m.content, m.tool_calls || [], m.usage || null);
      }
      scrollBottom();
    } catch {}
  }
  init();

  // ── DOM builders ─────────────────────────────────────────────────────────
  function addUserTurn(text) {
    hideEmpty();
    const turn = document.createElement('div');
    turn.className = 'turn user';
    const row = document.createElement('div');
    row.className = 'msg-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    turn.appendChild(row);
    messagesEl.appendChild(turn);
    scrollBottom();
  }

  function addLoadedAgentTurn(content, toolCalls = [], usage = null) {
    hideEmpty();
    const turn = document.createElement('div');
    turn.className = 'turn agent';

    const row = document.createElement('div');
    row.className = 'msg-row';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble agent-bubble';
    bubble.innerHTML = renderMd(content);
    row.appendChild(avatar);
    row.appendChild(bubble);
    turn.appendChild(row);

    if (toolCalls.length > 0 || usage) {
      const metaRow = document.createElement('div');
      metaRow.className = 'meta-row';
      turn.appendChild(metaRow);

      // Always show the tool calls box (even at 0) when the meta row is present
      const box = document.createElement('div');
      box.className = 'tool-calls-box';

      const tcHeader = document.createElement('div');
      tcHeader.className = 'tc-header';
      tcHeader.innerHTML = `
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
        </svg>
        <span class="tc-count">${toolCalls.length}</span>
        <span class="tc-label">tool calls</span>
        <span class="tc-chevron">▼</span>`;
      tcHeader.onclick = () => box.classList.toggle('open');

      const tcBody = document.createElement('div');
      tcBody.className = 'tc-body';
      for (const tc of toolCalls) {
        const item = document.createElement('div');
        item.className = 'tc-item';
        item.innerHTML = `
          <div class="tc-name"><span class="tc-dot"></span>${escHtml(tc.tool_name)}</div>
          <div class="tc-section">
            <div class="tc-section-label">Input</div>
            <div class="tc-json">${escHtml(fmtJson(tc.args))}</div>
          </div>
          <div class="tc-section">
            <div class="tc-section-label">Output</div>
            <div class="tc-json">${escHtml(fmtJson(tc.result))}</div>
          </div>`;
        tcBody.appendChild(item);
      }

      box.appendChild(tcHeader);
      box.appendChild(tcBody);
      metaRow.appendChild(box);

      if (usage) metaRow.appendChild(_buildUsageBox(usage));
    }

    messagesEl.appendChild(turn);
  }

  function addAgentTurn() {
    hideEmpty();
    const turn = document.createElement('div');
    turn.className = 'turn agent';
    messagesEl.appendChild(turn);

    // ── Status label — sits above the bubble, visible during tool execution ──
    const streamStatus = document.createElement('div');
    streamStatus.className = 'stream-status';
    streamStatus.innerHTML = `<div class="spinner-dots"><span></span><span></span><span></span></div><span class="spinner-label">On the case…</span>`;
    turn.appendChild(streamStatus);

    const row = document.createElement('div');
    row.className = 'msg-row';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble agent-bubble';
    row.appendChild(avatar);
    row.appendChild(bubble);
    turn.appendChild(row);

    const metaRow = document.createElement('div');
    metaRow.className = 'meta-row';
    turn.appendChild(metaRow);

    const box = document.createElement('div');
    box.className = 'tool-calls-box';

    const tcHeader = document.createElement('div');
    tcHeader.className = 'tc-header';
    tcHeader.innerHTML = `
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
      </svg>
      <span class="tc-count">0</span>
      <span class="tc-label">tool calls</span>
      <span class="tc-chevron">▼</span>`;
    tcHeader.onclick = () => box.classList.toggle('open');

    const tcBody = document.createElement('div');
    tcBody.className = 'tc-body';
    const spinner = document.createElement('div');
    spinner.className = 'tc-spinner';
    spinner.innerHTML = `<div class="spinner-dots"><span></span><span></span><span></span></div><span class="spinner-label">Running tools…</span>`;
    tcBody.appendChild(spinner);
    box.appendChild(tcHeader);
    box.appendChild(tcBody);
    metaRow.appendChild(box);

    const countEl = tcHeader.querySelector('.tc-count');
    let callCount = 0;

    return {
      bubble,
      setLabel(label) {
        const el = streamStatus.querySelector('.spinner-label');
        if (el) el.textContent = label;
      },
      hideStatus() {
        streamStatus.style.display = 'none';
      },
      addCall(toolName, args, result) {
        callCount++;
        countEl.textContent = callCount;
        const item = document.createElement('div');
        item.className = 'tc-item';
        item.innerHTML = `
          <div class="tc-name"><span class="tc-dot"></span>${toolName}</div>
          <div class="tc-section">
            <div class="tc-section-label">Input</div>
            <div class="tc-json">${escHtml(fmtJson(args))}</div>
          </div>
          <div class="tc-section">
            <div class="tc-section-label">Output</div>
            <div class="tc-json">${escHtml(fmtJson(result))}</div>
          </div>`;
        tcBody.insertBefore(item, spinner);
        scrollBottom();
      },
      finish(usage) {
        streamStatus.remove();
        spinner.remove();
        if (!usage) { scrollBottom(); return; }
        metaRow.appendChild(_buildUsageBox(usage));
        scrollBottom();
      }
    };
  }

  // ── Send / Stop ───────────────────────────────────────────────────────────
  const SEND_ICON = `<path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>`;
  const STOP_ICON = `<rect x="5" y="5" width="14" height="14" rx="2"/>`;

  let activeController = null;

  function stopMessage() {
    if (activeController) activeController.abort();
  }

  function _setBusy(busy) {
    document.getElementById('send-icon').innerHTML = busy ? STOP_ICON : SEND_ICON;
    sendBtn.classList.toggle('stopping', busy);
    sendBtn.onclick = busy ? stopMessage : sendMessage;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || activeController) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    activeController = new AbortController();
    _setBusy(true);

    addUserTurn(text);
    const { bubble, addCall, finish, setLabel, hideStatus } = addAgentTurn();
    let agentText = '';
    let statusVisible = true;

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text }),
        signal: activeController.signal,
      });

      if (!resp.ok) { bubble.textContent = 'Error: ' + resp.statusText; finish(null); return; }

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let payload;
          try { payload = JSON.parse(line.slice(6)); } catch { continue; }

          if (payload.type === 'token') {
            if (statusVisible) { hideStatus(); statusVisible = false; }
            agentText += payload.text;
            bubble.innerHTML = renderMd(agentText);
            scrollBottom();
          } else if (payload.type === 'tool_status') {
            setLabel(payload.label);
          } else if (payload.type === 'tool_call') {
            addCall(payload.tool, payload.args, payload.result);
          } else if (payload.type === 'done') {
            finish(payload.usage);
          }
        }
      }
    } catch (err) {
      if (err.name === 'AbortError') {
        if (!agentText) bubble.textContent = '(cancelled)';
        finish(null);
      } else {
        bubble.textContent = 'Connection error: ' + err.message;
        finish(null);
      }
    } finally {
      activeController = null;
      _setBusy(false);
      inputEl.focus();
      loadSessions(); // refresh sidebar after each turn
    }
  }
</script>
</body>
</html>
