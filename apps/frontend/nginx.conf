server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API + SSE calls to the backend.
    # /api/* covers the /api-prefixed routers (settings, users, history, init, monitoring,
    # integrations); /chat /sessions /stats /auth are the unprefixed ones.
    location ~ ^/(api|chat|sessions|stats|auth|history) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;          # required for SSE streaming
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
