<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-sans); }
  .grid { display: flex; gap: 12px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .swatch { height: 40px; border-radius: 6px; display:flex; align-items:center; padding: 0 10px; gap: 8px; border: 1px solid transparent; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .name { font-size: 12px; font-weight: 500; color: #374151; }
  .hex { font-size: 11px; color: #9CA3AF; font-family: var(--font-mono); margin-left: auto; }
</style>
</head>
<body>
<div class="grid">
  <div class="col">
    <div class="swatch" style="background:#ECFDF5; border-color:#A7F3D0">
      <div class="dot" style="background:#10B981"></div>
      <span class="name">Success</span>
      <span class="hex">#10B981</span>
    </div>
    <div class="swatch" style="background:#FFFBEB; border-color:#FDE68A">
      <div class="dot" style="background:#F59E0B"></div>
      <span class="name">Warning</span>
      <span class="hex">#F59E0B</span>
    </div>
    <div class="swatch" style="background:#FFF1F2; border-color:#FECDD3">
      <div class="dot" style="background:#F43F5E"></div>
      <span class="name">Danger</span>
      <span class="hex">#F43F5E</span>
    </div>
    <div class="swatch" style="background:#EEF2FF; border-color:#C7D2FE">
      <div class="dot" style="background:#6366F1"></div>
      <span class="name">Info</span>
      <span class="hex">#6366F1</span>
    </div>
  </div>
  <div class="col">
    <div style="font-size:11px; font-weight:600; color:#9CA3AF; letter-spacing:0.08em; text-transform:uppercase; padding: 2px 0 4px;">Status badges</div>
    <div style="display:flex; gap:6px; flex-wrap:wrap;">
      <span style="background:#ECFDF5; color:#059669; border:1px solid #A7F3D0; border-radius:4px; padding:3px 8px; font-size:12px; font-weight:500;">● Healthy</span>
      <span style="background:#FFFBEB; color:#D97706; border:1px solid #FDE68A; border-radius:4px; padding:3px 8px; font-size:12px; font-weight:500;">● Degraded</span>
      <span style="background:#FFF1F2; color:#E11D48; border:1px solid #FECDD3; border-radius:4px; padding:3px 8px; font-size:12px; font-weight:500;">● Failed</span>
      <span style="background:#EEF2FF; color:#4F46E5; border:1px solid #C7D2FE; border-radius:4px; padding:3px 8px; font-size:12px; font-weight:500;">● Running</span>
    </div>
  </div>
</div>
</body>
</html>
