<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-sans); }
  .label { font-size: 11px; font-weight: 600; color: #9CA3AF; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: flex-start; }
  .field { display: flex; flex-direction: column; gap: 5px; min-width: 180px; }
  .field-label { font-size: 12px; font-weight: 500; color: #374151; }
  input, select, textarea {
    font-family: var(--font-sans);
    font-size: 13px;
    color: #111827;
    background: #fff;
    border: 1px solid #D1D5DB;
    border-radius: 6px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 150ms, box-shadow 150ms;
    width: 100%;
    box-sizing: border-box;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #6366F1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }
  input.error { border-color: #F43F5E; }
  input.error:focus { box-shadow: 0 0 0 3px rgba(244,63,94,0.15); }
  input::placeholder { color: #9CA3AF; }
  .hint { font-size: 11px; color: #9CA3AF; }
  .error-msg { font-size: 11px; color: #E11D48; }
  .input-wrap { position: relative; }
  .input-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #9CA3AF; }
  .input-wrap input { padding-left: 30px; }
  .env-row { display: flex; gap: 6px; align-items: center; }
  .env-key { font-family: var(--font-mono); font-size: 12px; flex: 1; }
  .env-val { font-family: var(--font-mono); font-size: 12px; flex: 2; }
  .badge-masked { font-family: var(--font-mono); font-size: 12px; color: #9CA3AF; letter-spacing: 0.1em; }
</style>
</head>
<body>
  <div class="label">Text inputs</div>
  <div class="row">
    <div class="field">
      <label class="field-label">Agent name</label>
      <input type="text" placeholder="my-production-agent">
      <span class="hint">Used as the agent identifier in logs</span>
    </div>
    <div class="field">
      <label class="field-label">API endpoint</label>
      <div class="input-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <input type="text" placeholder="https://api.example.com">
      </div>
    </div>
    <div class="field">
      <label class="field-label">API key <span style="color:#E11D48">*</span></label>
      <input type="text" value="sk-prod-••••••••4f2a" class="error">
      <span class="error-msg">Invalid API key format</span>
    </div>
  </div>

  <div class="label">Environment variable editor</div>
  <div style="border: 1px solid #E5E7EB; border-radius: 8px; overflow: hidden; max-width: 500px;">
    <div style="display:flex; gap:0; background:#F9FAFB; border-bottom:1px solid #E5E7EB; padding: 6px 10px;">
      <span style="font-size:11px; font-weight:600; color:#6B7280; flex:1;">KEY</span>
      <span style="font-size:11px; font-weight:600; color:#6B7280; flex:2;">VALUE</span>
    </div>
    <div style="padding: 8px 10px; display:flex; flex-direction:column; gap:6px;">
      <div class="env-row">
        <input class="env-key" type="text" value="API_KEY" style="background:#F9FAFB;">
        <input class="env-val" type="password" value="sk-prod-abcdef123456">
      </div>
      <div class="env-row">
        <input class="env-key" type="text" value="DB_HOST">
        <input class="env-val" type="text" value="postgres://prod.cluster.internal">
      </div>
      <div class="env-row">
        <input class="env-key" type="text" placeholder="NEW_KEY" style="color:#9CA3AF;">
        <input class="env-val" type="text" placeholder="value">
      </div>
    </div>
  </div>
</body>
</html>
