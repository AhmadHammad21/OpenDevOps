# PostgreSQL backend — full persistence (production-like).
#   docker compose -f deployment/docker-compose/docker-compose.yml up --build
# Other backends: docker-compose.sqlite.yml (file), docker-compose.memory.yml (no persistence).
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16.4
    environment:
      POSTGRES_DB:       opendevops
      POSTGRES_USER:     dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d opendevops"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    # Build context is the REPO ROOT so the opendevops-core path dependency resolves.
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: ../../.env
    environment:
      CHECKPOINT_BACKEND: postgres
      DATABASE_URL: postgresql://dev:dev@db:5432/opendevops
    volumes:
      # Mount host cloud credentials so the bash tool's `aws`/`az` calls work.
      # AWS keys are static (read-only); az needs to refresh tokens, so mount it read-write.
      # On production (ECS/EC2/AKS), drop these and use an instance/managed identity instead.
      - ${USERPROFILE}/.aws:/home/app/.aws:ro
      - ${USERPROFILE}/.azure:/home/app/.azure
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── React frontend (production build served by nginx) ──────────────────────
  frontend:
    build: ../../apps/frontend
    ports:
      - "80:8080"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
